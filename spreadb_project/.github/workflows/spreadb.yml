name: SpreadB Backend Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - '**'
      - '.github/workflows/spreadb.yml'

env:
  IMAGE: spreadb-backend
  REGISTRY_HOSTNAME: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      docker_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY_HOSTNAME }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE }}
          tags: |
            type=sha

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Set Docker tag
        run: echo "TAG=${{ needs.build-and-push.outputs.docker_tag }}" >> $GITHUB_ENV

      - name: Deploy SpreadB Backend to EC2 via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters 'commands=[
              "sudo docker --version",
              "export DOCKER_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}",
              "export DOCKER_PASSWORD=${{ secrets.DOCKERHUB_PASSWORD }}",
              "export TAG=${{ env.TAG }}",
              "echo $DOCKER_PASSWORD | sudo docker login docker.io -u $DOCKER_USERNAME --password-stdin",
              "sudo docker pull docker.io/$DOCKER_USERNAME/spreadb-backend:$TAG",
              "sudo docker stop spreadb-backend-container || true",
              "sudo docker rm spreadb-backend-container || true",
              "sudo docker run -d --name spreadb-backend-container -p 3001:3001 --env-file /home/ubuntu/env/spreadb.env docker.io/$DOCKER_USERNAME/spreadb-backend:$TAG",
              "sudo docker ps -a",
              "sudo docker image prune -af || true",
              "sudo docker system prune -af --volumes || true"
            ]' \
            --comment "Deploying SpreadB Backend via GitHub Actions" \
            --region ap-south-1
